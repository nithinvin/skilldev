# =============================================================================
# Layer 5.2 — Production Docker Compose
# =============================================================================
#
# QUESTIONS:
#   1. How is this different from layer4/docker-compose.yml?
#      - No ports exposed except 80/443 (security)
#      - Environment variables from .env file (no secrets in code)
#      - Resource limits (prevent one container from eating all RAM)
#      - Logging configuration (don't fill disk with logs)
#      - Restart policies (survive server reboot)
#
#   2. What is a .env file?
#      Key=value pairs loaded by Docker Compose.
#      NEVER commit .env to git (add to .gitignore).
#      Share a .env.example with dummy values.
#
# =============================================================================

services:
  app:
    image: mybookshelf:latest
    # Q: Why "image" instead of "build"?
    # In production, you build ONCE in CI/CD and push to a registry.
    # The server just PULLS the pre-built image. No source code on server.
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        # Q: Why limit resources?
        # Memory leak in app → kills ONLY the app container, not the whole server.
        # Without limits: one bad container can OOM-kill everything.
    # Q: No ports! Only nginx talks to the app. App is NOT directly accessible.
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        # Q: Without log rotation, logs grow forever → disk full → server dies.
        # 3 files × 10MB = max 30MB of logs kept.

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
    # Q: No ports exposed! Only the app connects to DB via internal network.
    # In dev (layer4) we exposed 5432 for convenience. In prod: NEVER.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru
    # Q: What is allkeys-lru?
    # When Redis hits 100MB, it evicts Least Recently Used keys.
    # This prevents Redis from eating all server memory.
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Q: What is certbot? Free TLS certificates from Let's Encrypt.
      # HTTPS = encrypted traffic. Without it: passwords sent in plaintext.
    depends_on:
      - app
    restart: always
    networks:
      - internal
      - external

  # === CERTBOT (auto-renew TLS certificates) ===
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    # Q: What does this do?
    # Runs certbot renew every 12 hours. Certificates expire every 90 days.
    # Auto-renewal = you never manually manage certificates.

networks:
  internal:
    # Q: Internal network: containers can talk to each other.
    # Not accessible from the internet.
  external:
    # Q: External network: only nginx is on this.
    # nginx bridges external (internet) ↔ internal (app, db, redis).

volumes:
  pgdata:
  redisdata:
