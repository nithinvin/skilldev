# =============================================================================
# Layer 5.3 — Production Nginx Config with TLS (HTTPS)
# =============================================================================
#
# QUESTIONS:
#   1. What is TLS/SSL?
#      Transport Layer Security — encrypts traffic between browser and server.
#      Without TLS: anyone on the network can read passwords, tokens, data.
#      HTTP (port 80) = plaintext. HTTPS (port 443) = encrypted.
#
#   2. What is Let's Encrypt?
#      Free Certificate Authority. Provides TLS certificates at no cost.
#      Certificates expire every 90 days (auto-renewed by certbot).
#
#   3. What is the ACME challenge?
#      How Let's Encrypt verifies you own the domain:
#      1. You request a cert for "mybookshelf.example.com"
#      2. Let's Encrypt says "put this file at /.well-known/acme-challenge/xyz"
#      3. They check if it's there → proves you control the server → cert issued
#
# =============================================================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
# Q: Why separate rate limit for login?
# Login attempts should be MORE restricted (3/sec vs 10/sec) to prevent brute-force.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name mybookshelf.example.com;
    # Q: Change this to your actual domain!

    # Let's Encrypt ACME challenge (must be HTTP, not HTTPS)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
        # Q: 301 = permanent redirect. Browser remembers this.
        # Next time user types http://..., browser goes straight to https://...
    }
}

# HTTPS server (the real one)
server {
    listen 443 ssl;
    server_name mybookshelf.example.com;

    # TLS certificates (from Let's Encrypt via certbot)
    ssl_certificate /etc/letsencrypt/live/mybookshelf.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mybookshelf.example.com/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    # Q: Why not TLSv1.0 and TLSv1.1? They have known vulnerabilities.
    # TLSv1.2 = minimum for 2024. TLSv1.3 = fastest and most secure.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS: tell browsers to ALWAYS use HTTPS for this domain
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # Q: What does this do? For 2 years, browser refuses HTTP for this domain.
    # Even if user types http://..., browser upgrades to https:// automatically.

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    # Q: Content-Security-Policy = controls what resources the page can load.
    # 'self' = only load scripts/styles from your own domain (prevents XSS).

    # API routes
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login route (stricter rate limit)
    location /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://app:5000;
    }

    # Static files
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
