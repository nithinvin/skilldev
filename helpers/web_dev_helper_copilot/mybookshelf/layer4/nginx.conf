# =============================================================================
# Level 4.3 — Nginx Reverse Proxy Configuration
# =============================================================================
#
# QUESTIONS:
#   1. What is a reverse proxy?
#      Client → nginx → app server (client never talks to app directly)
#      Forward proxy: client → proxy → internet (client hides behind proxy)
#      Reverse proxy: internet → proxy → server (server hides behind proxy)
#
#   2. Why use nginx instead of serving directly from Flask/Gunicorn?
#      - Static files: nginx serves CSS/JS 10x faster than Python
#      - Security: nginx handles TLS, hides app server details
#      - Buffering: absorbs slow clients so app workers stay free
#      - Load balancing: distribute across multiple app instances
#      - Rate limiting: prevent abuse at the edge
#
# =============================================================================

# Rate limiting zone (prevent abuse)
# Q: What does this do? Limits each IP to 10 requests/second.
# Burst=20: allow short bursts up to 20, then enforce the limit.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream app_servers {
    # Q: Why an upstream block?
    # Allows load balancing across multiple app instances.
    # For now we have one. In production: add more.
    server app:5000;
    # "app" resolves to the Docker container via Docker DNS
}

server {
    listen 80;
    server_name localhost;

    # --- Security Headers ---
    # Q: What do these headers do?
    add_header X-Content-Type-Options "nosniff" always;
    # Prevents browsers from MIME-type sniffing (XSS prevention)
    
    add_header X-Frame-Options "DENY" always;
    # Prevents your site from being embedded in iframes (clickjacking prevention)
    
    add_header X-XSS-Protection "1; mode=block" always;
    # Legacy XSS filter (modern browsers have built-in protection)

    # --- API Routes → Application Server ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        # Q: nodelay = don't queue excess requests, reject them immediately

        proxy_pass http://app_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Q: Why set X-Real-IP?
        # Without it, the app sees nginx's IP, not the client's IP.
        # This header passes the real client IP through.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- Health endpoint (no rate limit) ---
    location /health {
        proxy_pass http://app_servers;
    }

    # --- Static files (served directly by nginx — fast!) ---
    location /static/ {
        alias /app/static/;
        expires 7d;
        # Q: expires 7d tells browsers to CACHE static files for 7 days.
        # Browser won't re-download style.css until the cache expires.
        # Change the file? Update the filename (cache busting: style.v2.css).
        add_header Cache-Control "public, immutable";
    }

    # --- Default: 404 ---
    location / {
        return 404 '{"error": "Not found"}';
        add_header Content-Type application/json;
    }
}
